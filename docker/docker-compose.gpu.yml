# GPU override — use with: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
version: "3.9"

services:
  nba-ml:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - DEVICE=cuda
      - CUDA_VISIBLE_DEVICES=0
    command: ["python", "src/main.py"]
