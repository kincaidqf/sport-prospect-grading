version: "3.9"

services:
  nba-ml:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../src:/app/src
      - ../data:/app/data
      - ../notebooks:/app/notebooks
      - ../outputs:/app/outputs
      - ../wandb:/app/wandb
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - WANDB_MODE=${WANDB_MODE:-offline}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - DEVICE=cpu
    tty: true
    stdin_open: true
    command: ["uv", "run", "python", "src/main.py"]
