defaults:
  - _self_

model:
  type: regression          # regression | classification | text | text_shallow | multimodal
  prospect_context_mode: individual  # individual | composite | both | none
  input_normalization_mode: global   # global | position_relative
  nba_role_score:
    target_score_mode: global       # global | position_relative
    tier_thresholds: [-0.5, 0.5, 1.5]
    nan_floor: -3.0
    winsor_clip: 2.5                # clip each per-stat z-score at ±this value before combining
    weights:                        # relative weights for the weighted z-score composite
      MIN: 0.30                     # floor time = role size by definition
      nba_pts: 0.25                 # primary offensive role signal
      nba_reb: 0.20                 # role signal; less position-skewed than BLK
      nba_ast: 0.15                 # role signal, especially for guards
      nba_stl: 0.05                 # low variance, _noisy, position-influenced
      nba_blk: 0.05                 # low variance, strongly center-skewed
  composite_score:          # shared by both regression and classification targets
    w_min: 0.55            # weight for NBA minutes per game z-score
    w_gp: 0.30             # weight for NBA games played z-score
    w_plus_minus: 0.15     # weight for NBA plus/minus z-score
    tier_percentiles: [50, 80]  # percentile cut points for bust/contributor/star (40/40/20 split)
    nan_floor: -3.0        # composite score assigned to players with no NBA data
  regression:
    target_mode: nba_role_zscore  # plus_minus | composite_score | nba_role_zscore
    use_draft_pick: true        # include draft pick as a feature (leaks scout judgment)
    use_engineered_features: false  # add ts_pct, efg_pct, usage_proxy, ast_to, etc.
    use_pos_categorical: true      # one-hot encode position (Guard/Forward/Center)
    alpha_min: 1e-4         # lasso/ridge alpha search range
    alpha_max: 1e2
    alpha_steps: 100
    cv_folds: 5
    xgboost:
      n_estimators: [100, 200]
      max_depth: [2, 3]
      learning_rate: [0.05, 0.1]
      subsample: [0.7, 0.9]
      colsample_bytree: [0.7, 1.0]
      min_child_weight: [3, 5, 10]
      reg_alpha: [0, 0.1, 1]
      reg_lambda: [1, 5, 10]
      gamma: [0]
      cv_folds: 3
      n_jobs: 1
      grid_n_jobs: 1
      pre_dispatch: 1
  classification:
    target_mode: prospect_tier  # became_starter | prospect_tier
    use_draft_pick: false       # include draft pick as a feature (leaks scout judgment)
    use_engineered_features: false  # add ts_pct, efg_pct, usage_proxy, ast_to, etc.
    use_pos_categorical: false      # one-hot encode position (Guard/Forward/Center)
    eval_mode: random           # random | chronological | repeated_cv
    class_weight: balanced      # null | balanced
    threshold_tuning: false     # true | false — tune per-class prob offsets on val set
    selection_metric: f1_macro  # metric used to rank candidate models
    xgboost:
      # Conservative defaults for fast smoke tests; expand values for full grid search.
      # Full range options: n_estimators [100,300], max_depth [2,3], lr [0.02,0.05,0.1],
      # subsample [0.7,0.9], colsample_bytree [0.7,1.0], min_child_weight [3,5,10],
      # reg_alpha [0,0.1,1], reg_lambda [1,5,10], gamma [0,0.5]
      n_estimators: [100, 200]
      max_depth: [2, 3]
      learning_rate: [0.05, 0.1]
      subsample: [0.7, 0.9]
      colsample_bytree: [1.0]
      min_child_weight: [3, 10]
      reg_alpha: [0, 0.1]
      reg_lambda: [1, 5]
      gamma: [0]
      cv_folds: 3
      n_jobs: 1
      grid_n_jobs: 1
      pre_dispatch: 1
  text:
    pretrained: "distilbert-base-uncased"
    output_dim: 64
    hidden_dim: 32
    dropout: 0.2
    huber_beta: 1.0
    max_length: 128
    freeze_base: true
    task: regression # task: regression | classification — CE on prospect_tier often tracks tabular clf better for stacking (softmax tier probs).
    classification_target_col: prospect_tier
    num_classes: 4
    regression_target_col: nba_role_zscore # Regression targets: nba_role_zscore (Gaussian tier export), VORP, DPM — VORP/DPM require columns on nba master.
    tier_proba_csv_path: null  # e.g. outputs/text_tier_proba_full.csv — all (Name, draft_year) with text; use with multimodal

  # Shallow scouting-text ridge model (NLTK VADER + lexicons, optional TF–IDF) for multimodal text towers.
  text_shallow:
    ridge_alpha: 1.0
    sentiment:
      enabled: true
      use_pos_neg_neu: true
    # lexicons: {}  # optional: success_words, red_flag_words, red_flag_phrases lists
    tfidf:
      enabled: false
      max_features: 1000
      min_df: 2
      ngram_range: [1, 2]

  # Probability stacking: tabular clf/reg + scouting text, each with OOF meta features then a final refit.
  multimodal:
    cv_folds: 3
    output_dir: outputs/multimodal
    text_tier_proba_csv: null  # same path as model.text.tier_proba_csv_path after a text run; null = stats-only stacker
    text_meta_key: scouting   # fallback only when base_models.text is omitted
    base_models:
      classification: [logistic_l2, xgboost]
      regression: [ridge, xgboost]
      text: [scouting, scouting_lexicon]
    text_backends:
      scouting: transformer
      scouting_lexicon: shallow_lexicon
    # Text stacks use the same pattern as stats models: list keys under base_models.text, then map each key
    # to transformer (deep) or shallow_lexicon via text_backends (default: transformer).
    # text_shallow_overrides:  # optional per-key dict merged onto model.text_shallow
    #   scouting_lexicon:
    #     ridge_alpha: 1.0
    # Legacy alternative when base_models.text is not set:
    # text_towers:
    #   - meta_key: scouting
    #     type: transformer
    #   - meta_key: scouting_lexicon
    #     type: shallow_lexicon
    calibration:
      method: sigmoid
      calibration_size: 0.15
    xgboost:
      pretune_oof_params: false
      # Used only for multimodal OOF + final XGB fits (use_fixed_xgb_params=True). Smaller + hist = less RAM.
      oof_params:
        n_estimators: 100
        max_depth: 3
        learning_rate: 0.1
        subsample: 0.85
        colsample_bytree: 0.9
        min_child_weight: 5
        reg_alpha: 0.1
        reg_lambda: 5
        gamma: 0
        tree_method: hist

training:
  batch_size: 48
  lr: 1e-3
  weight_decay: 1e-4
  epochs: 10
  early_stopping_patience: 3
  grad_clip: 1.0
  seed: 42

data:
  stats_path: data/scouting/players.csv
  scouting_path: data/scouting/scouting_texts.txt
  nba_path: data/nba/nba_master.csv
  ncaa_path: data/ncaa/ncaa_master.csv
  best_season_mode: composite  # composite | vorp | darko — best of first 3 NBA seasons (fetch_nba_stats.py / recover_nba_players.py)
  target_col: PLUS_MINUS      # NBA target: PLUS_MINUS | VORP (*_vorp.csv) | DPM (*_darko.csv)
  test_split: 0.15
  val_split: 0.15
  num_workers: 4

logging:
  project: nba-draft-ml
  run_name: null             # auto-generated if null
  log_every_n_steps: 10
  save_top_k: 3
  mlflow:
    tracking_uri: null       # set to a shared MLflow server or shared folder path for team-wide visibility
    artifact_location: null  # optional shared artifact root for new experiments
    experiment_name: null    # optional override for a single shared experiment name
    experiment_prefix: nba-draft-ml

output:
  dir: outputs/
  checkpoint_dir: outputs/checkpoints/
  plots_dir: outputs/plots/
