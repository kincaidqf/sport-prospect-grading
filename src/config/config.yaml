defaults:
  - _self_

model:
  type: regression          # regression | text | multimodal
  regression:
    target_mode: survived_3yrs  # plus_minus | became_starter | survived_3yrs
    use_draft_pick: false        # include draft pick as a feature (leaks scout judgment)
    alpha_min: 1e-4         # lasso alpha search range
    alpha_max: 1e2
    alpha_steps: 100
    max_iter: 10000
    cv_folds: 5
  text:
    pretrained: "distilbert-base-uncased"
    max_length: 512
    freeze_base: false
  multimodal:
    fusion: concat           # concat | attention | gate
    hidden_dim: 256
    dropout: 0.3

training:
  batch_size: 32
  lr: 1e-3
  weight_decay: 1e-4
  epochs: 50
  early_stopping_patience: 10
  grad_clip: 1.0
  seed: 42

data:
  stats_path: data/scouting/players.csv
  scouting_path: data/scouting/scouting_texts.txt
  nba_path: data/nba/nba_master.csv
  ncaa_path: data/ncaa/ncaa_master.csv
  target_col: PLUS_MINUS      # NBA performance target (set to VORP with *_vorp.csv)
  test_split: 0.15
  val_split: 0.15
  num_workers: 4

logging:
  project: nba-draft-ml
  run_name: null             # auto-generated if null
  log_every_n_steps: 10
  save_top_k: 3

output:
  dir: outputs/
  checkpoint_dir: outputs/checkpoints/
